<!DOCTYPE html>
<html>
<head>
    <title>Hotel Management System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h3 {
            margin-top: 0;
            color: #1e293b;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #1e293b;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        .section-title {
            text-align: center;
            margin-top: 30px;
            font-size: 20px;
            color: #333;
        }
    </style>
</head>
<body>

<header>Hotel Management System</header>

<div class="container">

    <div class="card">
        <h3>Add Customer</h3>
        <input id="name" placeholder="Name">
        <input id="phone" placeholder="Phone">
        <input id="email" placeholder="Email">
        <button onclick="addCustomer()">Add Customer</button>
    </div>

    <div class="card">
        <h3>Book Room</h3>
        <input id="custId" placeholder="Customer ID">
        <input id="roomId" placeholder="Room ID">
        <input id="checkin" type="date">
        <input id="checkout" type="date">
        <button onclick="bookRoom()">Book Room</button>
    </div>

</div>

<div class="section-title">Customers</div>
<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th></tr>
</thead>
<tbody id="custTable"></tbody>
</table>

<div class="section-title">Rooms</div>
<table>
<thead>
<tr><th>ID</th><th>Type</th><th>Status</th></tr>
</thead>
<tbody id="roomTable"></tbody>
</table>

<div class="section-title">Bookings</div>
<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Room</th></tr>
</thead>
<tbody id="bookingTable"></tbody>
</table>

<script>

function addCustomer(){
    fetch('https://hotel-management-xf4j.onrender.com/addCustomer',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value
        })
    }).then(res=>res.text()).then(alert);
